<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>Create Order</title></head>
<body>
<h2>创建订单</h2>
<form method="post" action="/orders/create">
    <input name="username" placeholder="用户名" required>
    <input name="email" placeholder="邮箱" required>
    <input name="itemName" placeholder="商品" required>
    <input name="idCard" placeholder="证件号" required>
    <input name="phone" placeholder="手机号" required>
    <input name="paymentCard" placeholder="支付卡号" required>
    <input name="address" placeholder="地址" required>
    <input name="secondaryContact" placeholder="备用联系人">
    <button type="submit">提交</button>
</form>
</body>
</html>
