<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<h2>Member List</h2>
<table>
    <tr><th>id</th><th>name</th><th>idCard</th><th>phone</th><th>email</th><th>purchaseHistory</th></tr>
    <tr th:each="m : ${members}">
        <td th:text="${m.id}"></td>
        <td th:text="${m.name}"></td>
        <td th:text="${m.idCard}"></td>
        <td th:text="${m.phone}"></td>
        <td th:text="${m.email}"></td>
        <td th:text="${m.purchaseHistory}"></td>
    </tr>
</table>
</body>
</html>
