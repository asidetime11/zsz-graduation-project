<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><body>
<table>
    <tr th:each="c : ${claims}">
        <td th:text="${c.claimNo}"></td>
        <td th:text="${c.claimant.idCard}"></td>
        <td th:text="${c.claimant.bankAccount}"></td>
        <td th:text="${c.status}"></td>
    </tr>
</table>
</body></html>
