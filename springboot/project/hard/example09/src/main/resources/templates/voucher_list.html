<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<h2>Voucher List</h2>
<table>
    <tr><th>voucherNo</th><th>bankAccount</th><th>taxNo</th><th>idCard</th></tr>
    <tr th:each="v : ${vouchers}">
        <td th:text="${v.voucherNo}"></td>
        <td th:text="${v.bankAccount}"></td>
        <td th:text="${v.taxNo}"></td>
        <td th:text="${v.idCard}"></td>
    </tr>
</table>
</body>
</html>
