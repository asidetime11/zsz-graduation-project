<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>工单创建</title></head><body>
<h2>客服工单</h2>
<form method="post" action="/tickets/create">
<input name="subject" placeholder="问题主题"/><br/>
<input name="idCard" placeholder="身份证号"/><br/>
<input name="phone" placeholder="手机号"/><br/>
<input name="address" placeholder="联系地址"/><br/>
<input name="familyAddress" placeholder="家庭住址"/><br/>
<button type="submit">提交工单</button>
</form>
</body></html>
