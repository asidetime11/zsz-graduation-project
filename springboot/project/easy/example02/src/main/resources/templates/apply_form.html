<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>活动报名</title></head><body>
<h2>校园活动报名</h2>
<form method="post" action="/events/apply">
    <input name="studentName" placeholder="学生姓名"/><br/>
    <input name="studentPhone" placeholder="学生手机号"/><br/>
    <input name="emergencyPhone" placeholder="紧急联系人手机号"/><br/>
    <input name="parentJob" placeholder="父母职业"/><br/>
    <input name="annualIncome" placeholder="家庭年收入"/><br/>
    <button type="submit">提交</button>
</form>
</body></html>
