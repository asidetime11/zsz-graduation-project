<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>通知记录页</title>
</head>
<body>
    <h1>通知记录页</h1>
    <p><a href="/export/start/">导出任务页</a> | <a href="/admin-page/">管理员页面</a></p>

    <table border="1" cellpadding="8">
        <thead>
            <tr><th>ID</th><th>User</th><th>Message</th><th>Sent At</th></tr>
        </thead>
        <tbody>
            {% for item in notifications %}
            <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.user.username }}</td>
                <td>{{ item.message }}</td>
                <td>{{ item.sent_at }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="4">暂无通知</td></tr>
            {% endfor %}
        </tbody>
    </table>

    <h3>API 返回预览</h3>
    <pre>{{ api_payload }}</pre>
</body>
</html>
