<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>用户注册</title>
</head>
<body>
    <h1>用户注册</h1>
    <form method="post" action="/register/">
        {% csrf_token %}
        <p>
            <label>姓名：</label>
            <input type="text" name="name" required />
        </p>
        <p>
            <label>证件号：</label>
            <input type="text" name="id_card" required />
        </p>
        <p>
            <label>手机号：</label>
            <input type="text" name="phone" required />
        </p>
        <p>
            <label>银行卡号：</label>
            <input type="text" name="bank_account" required />
        </p>
        <p>
            <label>家庭成员数量：</label>
            <input type="number" name="family_members" value="0" min="0" />
        </p>
        <button type="submit">提交注册</button>
    </form>

    <p><a href="/users/">查看用户列表</a></p>
</body>
</html>
