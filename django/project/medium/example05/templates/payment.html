<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>支付页面</title>
</head>
<body>
    <h1>第三方支付集成平台</h1>
    <form method="post" action="/pay/">
        {% csrf_token %}
        <div><label>用户名: <input type="text" name="username"></label></div>
        <div><label>邮箱: <input type="email" name="email"></label></div>
        <div><label>手机号: <input type="text" name="phone"></label></div>
        <div><label>银行账户: <input type="text" name="bank_account"></label></div>
        <div><label>支付金额: <input type="text" name="amount"></label></div>
        <div><label>银行卡号: <input type="text" name="card_number"></label></div>
        <button type="submit">立即支付</button>
    </form>
    <p><a href="/transactions/">查看交易记录</a></p>
    <p><a href="/admin/users/">管理员用户页</a></p>
</body>
</html>
