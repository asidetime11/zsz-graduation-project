<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>用户管理页</title>
</head>
<body>
  <h1>用户管理页</h1>
  <table border="1" cellpadding="6">
    <thead>
      <tr><th>ID</th><th>username</th><th>email</th><th>phone</th><th>id_card</th><th>操作</th></tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.username }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.phone }}</td>
        <td>{{ u.id_card }}</td>
        <td>
          <form method="post" action="/users/{{ u.id }}/">
            {% csrf_token %}
            <input type="hidden" name="_method" value="DELETE">
            <button type="submit">删除</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  <p><a href="/activities/">活动记录页</a></p>
</body>
</html>
