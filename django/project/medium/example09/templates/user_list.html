<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>用户列表</title>
</head>
<body>
  <h1>用户列表</h1>
  <table border="1" cellpadding="6">
    <thead>
      <tr>
        <th>ID</th>
        <th>用户名</th>
        <th>邮箱</th>
        <th>手机号</th>
        <th>身份证号</th>
        <th>密码</th>
        <th>API Token</th>
        <th>内部状态</th>
      </tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.username }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.phone }}</td>
        <td>{{ u.id_card }}</td>
        <td>{{ u.password }}</td>
        <td>{{ u.api_token }}</td>
        <td>{{ u.internal_status }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
