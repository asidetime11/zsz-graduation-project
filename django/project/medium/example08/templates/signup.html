<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>报名表单页</title>
</head>
<body>
    <h1>社区活动报名系统</h1>
    <form method="post" action="/activity/signup/">
        {% csrf_token %}
        <div><label>姓名: <input type="text" name="user_name"></label></div>
        <div><label>身份证号: <input type="text" name="id_card"></label></div>
        <div><label>手机号: <input type="text" name="phone"></label></div>
        <div><label>护照号: <input type="text" name="passport_no"></label></div>
        <div><label>病史: <textarea name="medical_history"></textarea></label></div>
        <div><label>婚姻状况: <input type="text" name="marital_status"></label></div>
        <div><label>宗教信仰: <input type="text" name="religion"></label></div>
        <div><label>家庭月收入: <input type="text" name="family_income"></label></div>
        <div>
            <label>活动:</label>
            <select name="activity_id">
                {% for a in activities %}
                <option value="{{ a.id }}">{{ a.name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit">提交报名</button>
    </form>
    <p><a href="/activities/">活动列表</a></p>
    <p><a href="/participants/">参与者列表</a></p>
</body>
</html>
