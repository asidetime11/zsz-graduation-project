<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户信息页</title>
</head>
<body>
    <h2>用户信息列表</h2>
    <table border="1" cellpadding="8">
        <thead>
            <tr>
                <th>ID</th>
                <th>用户名</th>
                <th>邮箱</th>
                <th>手机号</th>
                <th>身份证号</th>
                <th>IP地址</th>
            </tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr>
                <td>{{ u.id }}</td>
                <td>{{ u.username }}</td>
                <td>{{ u.email }}</td>
                <td>{{ u.phone }}</td>
                <td>{{ u.id_card }}</td>
                <td>{{ u.ip_address }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <p><a href="/">返回问卷页</a></p>
</body>
</html>
