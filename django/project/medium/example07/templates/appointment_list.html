<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>预约列表页</title>
</head>
<body>
    <h2>预约列表</h2>
    <table border="1" cellpadding="8">
        <thead>
            <tr>
                <th>ID</th>
                <th>患者ID</th>
                <th>医生</th>
                <th>日期</th>
                <th>原因</th>
                <th>创建时间</th>
            </tr>
        </thead>
        <tbody>
            {% for a in appointments %}
            <tr>
                <td>{{ a.id }}</td>
                <td>{{ a.patient }}</td>
                <td>{{ a.doctor_name }}</td>
                <td>{{ a.date }}</td>
                <td>{{ a.reason }}</td>
                <td>{{ a.created_at }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <p><a href="/">返回预约页</a></p>
</body>
</html>
