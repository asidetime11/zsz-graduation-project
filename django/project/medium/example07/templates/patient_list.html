<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>患者信息页</title>
</head>
<body>
    <h2>患者信息列表</h2>
    <table border="1" cellpadding="8">
        <thead>
            <tr>
                <th>ID</th>
                <th>姓名</th>
                <th>身份证号</th>
                <th>手机号</th>
                <th>病史</th>
                <th>过敏史</th>
                <th>家属证件号</th>
                <th>营销同意</th>
                <th>数据采集同意</th>
            </tr>
        </thead>
        <tbody>
            {% for p in patients %}
            <tr>
                <td>{{ p.id }}</td>
                <td>{{ p.name }}</td>
                <td>{{ p.id_card }}</td>
                <td>{{ p.phone }}</td>
                <td>{{ p.medical_history }}</td>
                <td>{{ p.allergies }}</td>
                <td>{{ p.emergency_contact_id }}</td>
                <td>{{ p.marketing_agree }}</td>
                <td>{{ p.data_collection_consent }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <p><a href="/">返回预约页</a></p>
</body>
</html>
