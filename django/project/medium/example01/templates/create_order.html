<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>创建订单</title>
</head>
<body>
    <h1>创建订单</h1>
    <p><a href="/orders/">查看订单列表</a></p>
    <form method="post" action="/orders/create/">
        {% csrf_token %}
        <h3>用户信息</h3>
        <label>用户名：<input type="text" name="username" required></label><br><br>
        <label>邮箱：<input type="email" name="email" required></label><br><br>
        <label>手机号：<input type="text" name="phone" required></label><br><br>
        <label>身份证号：<input type="text" name="id_card" required></label><br><br>
        <label>护照号：<input type="text" name="passport_no"></label><br><br>

        <h3>订单信息</h3>
        <label>商品项：<textarea name="items" required></textarea></label><br><br>
        <label>总价：<input type="text" name="total_price" required></label><br><br>
        <label>地址：<input type="text" name="address" required></label><br><br>
        <label>支付卡号：<input type="text" name="payment_card" required></label><br><br>
        <label>状态：<input type="text" name="status" value="pending"></label><br><br>

        <button type="submit">提交订单</button>
    </form>
</body>
</html>
